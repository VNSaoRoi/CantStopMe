# CantStopMe unified filter pool — Linux/bash (Kali)
# See blacklist_pool/SOURCES.md for external references (PAT, HackTricks, Commix, …)

version: 3

# Shell metacharacters & operators (PAT chaining + ch53 preg_replace + Commix filters)
characters:
  - backslash
  - "$"
  - "|"
  - "`"
  - ";"
  - "&"
  - "<"
  - ">"
  - "("
  - ")"
  - "{"
  - "}"
  - "["
  - "]"
  - "*"
  - "?"
  - "!"
  - "#"
  - ":"
  - "@"
  - "'"
  - '"'
  - "~"
  - "="
  - ","
  - "%"
  - "."
  - "+"

# Command names often blacklisted (Commix + PAT + HackTricks + WAF lists)
keywords:
  - cat
  - tac
  - head
  - tail
  - less
  - more
  - nl
  - sort
  - uniq
  - wc
  - cut
  - tr
